<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sakinjira</title>
</head>
<body>
    <main>
        <h1>Sakinjira</h1>
        
        <div id="status" class="status">読み込み中...</div>

        <div class="actions">
            <button id="login_btn">Googleでログイン</button>
            <button id="logout_btn">ログアウト</button>
            <button id="insert_data">データ挿入</button>
            <button id="fetch_data">データ取得</button>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase
        const supabaseDB = createClient('https://nyvcpaxpalzcwhtwggfg.supabase.co', 'sb_publishable_n8kMJ7sQ2zJaJuJgKjFeCw_5ZFg1DKB')

        const statusEl = document.getElementById('status')
        const loginBtn = document.getElementById('login_btn')
        const logoutBtn = document.getElementById('logout_btn')
        const insertBtn = document.getElementById('insert_data')
        const fetchBtn = document.getElementById('fetch_data')

        const renderState = async () => {
            const { data: { session }, error } = await supabaseDB.auth.getSession()

            if (error) {
                statusEl.textContent = `セッションの取得に失敗しました: ${error.message}`
                logoutBtn.disabled = true
                insertBtn.disabled = true
                return
            }

            if (!session?.user) {
                statusEl.textContent = '未ログインです。Googleでログインを押してください。'
                logoutBtn.disabled = true
                insertBtn.disabled = true
                return
            }

            const identities = session.user.identities?.map((identity) => identity.provider).join(', ') || 'unknown'
            statusEl.textContent = [
                'ログイン済みです。',
                `user.id: ${session.user.id}`,
                `email: ${session.user.email ?? '-'}`,
                `providers: ${identities}`,
            ].join('\n')
            logoutBtn.disabled = false
            insertBtn.disabled = false
        }

        loginBtn.addEventListener('click', async () => {
            loginBtn.disabled = true

            const { error } = await supabaseDB.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin,
                },
            })

            if (error) {
                statusEl.textContent = `Googleログインに失敗しました: ${error.message}`
                loginBtn.disabled = false
                return
            }

            statusEl.textContent = 'Google の認証画面へ移動しています...'
        })

        logoutBtn.addEventListener('click', async () => {
            const { error } = await supabaseDB.auth.signOut()

            if (error) {
                statusEl.textContent = `ログアウトに失敗しました: ${error.message}`
                return
            }

            await renderState()
        })

        insertBtn.addEventListener('click', async () => {
            const { data: { user }, error } = await supabaseDB.auth.getUser()

            console.log(user)

            if (error) {
                statusEl.textContent = `ユーザー取得に失敗しました: ${error.message}`
                return
            }

            statusEl.textContent = user
                ? `現在の user.id は ${user.id} です。`
                : 'まだログインしていません。'

            // DBにタスクを追加
            const { error: insertError } = await supabaseDB.from('tasks').insert({
                user_id: user?.id,
                title: `タスク ${new Date().toLocaleTimeString()}`,
                description: 'これはサンプルのタスクです。',
                is_done: false,
                importance: 1,
                // タイムゾーンを含むタイムスタンプ
                created_at: new Date().toISOString(),
                published_at: new Date().toISOString(),
                closed_at: null,
                target_at: null,
                scheduled_at: null
            })
        })

        fetchBtn.addEventListener('click', async () => {
            const { data: tasks, error } = await supabaseDB.from('tasks').select('*')

            if (error) {
                statusEl.textContent = `タスクの取得に失敗しました: ${error.message}`
                return
            }

            console.log('取得したタスク:', tasks)
        })

        supabaseDB.auth.onAuthStateChange(async () => {
            await renderState()
        })

        renderState()
    </script>
</body>
</html>
